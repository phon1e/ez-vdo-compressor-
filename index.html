<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Compressor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --border: #2a2a2a; --border-hover: #444;
    --text: #e8e8e8; --muted: #666; --accent: #d4ff4e; --danger: #ff4e4e;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 20px 80px; }
  header { width: 100%; max-width: 580px; margin-bottom: 40px; }
  header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
  header p { font-size: 13px; color: var(--muted); font-weight: 300; }
  .card { width: 100%; max-width: 580px; background: var(--surface); border: 1px solid var(--border); padding: 28px; margin-bottom: 12px; }
  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .tab-row { display: flex; border: 1px solid var(--border); width: fit-content; margin-bottom: 20px; }
  .tab-btn { background: none; border: none; color: var(--muted); font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 20px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .tab-btn:first-child { border-right: 1px solid var(--border); }
  .tab-btn.active { background: var(--accent); color: #0e0e0e; }
  .drop-zone { border: 1px dashed var(--border); padding: 32px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(212,255,78,0.03); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-label { font-family: var(--mono); font-size: 12px; color: var(--muted); pointer-events: none; }
  .drop-label span { display: block; font-size: 11px; margin-top: 5px; color: #444; }
  .file-name { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-top: 10px; word-break: break-all; }
  .quality-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .quality-opt { border: 1px solid var(--border); padding: 12px 10px; cursor: pointer; transition: border-color 0.15s, background 0.15s; text-align: center; }
  .quality-opt:hover { border-color: var(--border-hover); }
  .quality-opt.selected { border-color: var(--accent); background: rgba(212,255,78,0.05); }
  .quality-opt .q-label { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); }
  .quality-opt.selected .q-label { color: var(--accent); }
  .quality-opt .q-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .run-btn { width: 100%; max-width: 580px; background: var(--accent); color: #0e0e0e; border: none; padding: 14px; font-family: var(--mono); font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; margin-bottom: 12px; }
  .run-btn:hover { opacity: 0.88; }
  .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .log-card { display: none; width: 100%; max-width: 580px; background: var(--surface); border: 1px solid var(--border); padding: 20px 24px; }
  .log-card.visible { display: block; }
  .progress-bar-wrap { height: 2px; background: var(--border); margin-bottom: 16px; }
  .progress-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
  .log-lines { font-family: var(--mono); font-size: 11px; color: var(--muted); line-height: 1.8; max-height: 200px; overflow-y: auto; }
  .log-lines .ok  { color: var(--accent); }
  .log-lines .err { color: var(--danger); }
  .log-lines .info { color: var(--text); }
  .dl-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
  .dl-item { display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); padding: 10px 14px; }
  .dl-name { font-family: var(--mono); font-size: 11px; color: var(--text); }
  .dl-btn { background: none; border: 1px solid var(--accent); color: var(--accent); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 12px; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .dl-btn:hover { background: var(--accent); color: #0e0e0e; }
</style>
</head>
<body>

<header>
  <h1>Video Compressor</h1>
  <p>Runs entirely in your browser. No upload, no server.</p>
</header>

<div class="card">
  <div class="section-label">Input</div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('mp4')">Single video</button>
    <button class="tab-btn" onclick="switchTab('zip')">Zip file</button>
  </div>
  <div id="tab-mp4">
    <div class="drop-zone" id="drop-mp4">
      <input type="file" id="file-mp4" accept="video/*">
      <div class="drop-label">Click or drop a video file<span>MP4, MOV, AVI, MKV ...</span></div>
    </div>
    <div class="file-name" id="name-mp4"></div>
  </div>
  <div id="tab-zip" style="display:none">
    <div class="drop-zone" id="drop-zip">
      <input type="file" id="file-zip" accept=".zip">
      <div class="drop-label">Click or drop a zip file<span>Zip containing video files</span></div>
    </div>
    <div class="file-name" id="name-zip"></div>
  </div>
</div>

<div class="card">
  <div class="section-label">Output Quality</div>
  <div class="quality-grid">
    <div class="quality-opt" data-res="1280:720" data-crf="22" onclick="selectQuality(this)">
      <div class="q-label">720p</div><div class="q-sub">High</div>
    </div>
    <div class="quality-opt selected" data-res="1280:720" data-crf="28" onclick="selectQuality(this)">
      <div class="q-label">720p</div><div class="q-sub">Balanced</div>
    </div>
    <div class="quality-opt" data-res="854:480" data-crf="28" onclick="selectQuality(this)">
      <div class="q-label">480p</div><div class="q-sub">Smallest</div>
    </div>
  </div>
</div>

<button class="run-btn" id="run-btn" onclick="run()">Compress</button>

<div class="log-card" id="log-card">
  <div class="section-label" id="log-title">Processing</div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
  <div class="log-lines" id="log-lines"></div>
  <div class="dl-list" id="dl-list"></div>
</div>

<!-- v0.11 loads as a single script — no Worker/CORS issues on GitHub Pages -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
const VIDEO_EXT = ['mp4','mov','avi','mkv','wmv','flv','webm','m4v'];
let activeTab   = 'mp4';
let ffmpegReady = false;

const { createFFmpeg } = FFmpeg;
const ff = createFFmpeg({
  log: false,
  corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
  progress: ({ ratio }) => setProgress(Math.round((ratio || 0) * 100))
});

// ── tab ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tab-mp4').style.display = tab === 'mp4' ? '' : 'none';
  document.getElementById('tab-zip').style.display = tab === 'zip' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', (i === 0) === (tab === 'mp4'))
  );
}

function selectQuality(el) {
  document.querySelectorAll('.quality-opt').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function getQuality() {
  const s = document.querySelector('.quality-opt.selected');
  return { res: s.dataset.res, crf: s.dataset.crf };
}

// ── file labels ───────────────────────────────────────────────────────────────
document.getElementById('file-mp4').addEventListener('change', e =>
  document.getElementById('name-mp4').textContent = e.target.files[0]?.name ?? '');
document.getElementById('file-zip').addEventListener('change', e =>
  document.getElementById('name-zip').textContent = e.target.files[0]?.name ?? '');

['drop-mp4','drop-zip'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover',  e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop',      () => el.classList.remove('drag-over'));
});

// ── log / progress ────────────────────────────────────────────────────────────
function log(msg, cls = '') {
  const el   = document.getElementById('log-lines');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progress-fill').style.width = Math.min(pct, 100) + '%';
}

function addDownload(filename, blob) {
  const url  = URL.createObjectURL(blob);
  const mb   = (blob.size / 1024 / 1024).toFixed(1);
  const list = document.getElementById('dl-list');
  const item = document.createElement('div');
  item.className = 'dl-item';
  item.innerHTML = `
    <span class="dl-name">${filename} <span style="color:var(--muted)">(${mb} MB)</span></span>
    <button class="dl-btn" onclick="triggerDl('${url}','${filename}')">Download</button>`;
  list.appendChild(item);
}

function triggerDl(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
}

// ── load ffmpeg ───────────────────────────────────────────────────────────────
async function ensureLoaded() {
  if (ffmpegReady) return;
  log('Loading ffmpeg.wasm (~25 MB, one time)...');
  await ff.load();
  ffmpegReady = true;
  log('ffmpeg ready.', 'ok');
}

// ── compress one video ────────────────────────────────────────────────────────
async function compressOne(uint8, originalName, res, crf) {
  const ext      = originalName.split('.').pop().toLowerCase();
  const inName   = `input.${ext}`;
  const outName  = 'output.mp4';
  const nameOnly = originalName.replace(/\.[^.]+$/, '');

  log(`Compressing ${originalName}...`, 'info');
  setProgress(0);

  ff.FS('writeFile', inName, uint8);

  await ff.run(
    '-i', inName,
    '-vcodec', 'libx264',
    '-crf', String(crf),
    '-vf', `scale=${res}`,
    '-acodec', 'aac', '-b:a', '128k',
    '-movflags', '+faststart',
    '-preset', 'fast',
    outName
  );

  const data = ff.FS('readFile', outName);
  const blob = new Blob([data.buffer], { type: 'video/mp4' });

  try { ff.FS('unlink', inName);  } catch (_) {}
  try { ff.FS('unlink', outName); } catch (_) {}

  log(`${nameOnly}.mp4 — ${(blob.size/1024/1024).toFixed(1)} MB`, 'ok');
  addDownload(`${nameOnly}.mp4`, blob);
}

// ── main ──────────────────────────────────────────────────────────────────────
async function run() {
  const btn     = document.getElementById('run-btn');
  const logCard = document.getElementById('log-card');

  const file = activeTab === 'mp4'
    ? document.getElementById('file-mp4').files[0]
    : document.getElementById('file-zip').files[0];

  if (!file) { alert(`Select a ${activeTab === 'mp4' ? 'video' : 'zip'} file first.`); return; }

  const { res, crf } = getQuality();

  btn.disabled = true;
  btn.textContent = 'Working...';
  document.getElementById('log-lines').innerHTML = '';
  document.getElementById('dl-list').innerHTML   = '';
  document.getElementById('log-title').textContent = 'Processing';
  setProgress(0);
  logCard.classList.add('visible');

  try {
    await ensureLoaded();

    if (activeTab === 'mp4') {
      const buf = await file.arrayBuffer();
      await compressOne(new Uint8Array(buf), file.name, res, crf);
      setProgress(100);

    } else {
      const zip     = await JSZip.loadAsync(await file.arrayBuffer());
      const entries = Object.values(zip.files).filter(f => {
        const ext = f.name.split('.').pop().toLowerCase();
        return !f.dir && VIDEO_EXT.includes(ext);
      });

      if (!entries.length) { log('No video files found in zip.', 'err'); return; }
      log(`${entries.length} video(s) found.`);

      for (let i = 0; i < entries.length; i++) {
        const name = entries[i].name.split('/').pop();
        log(`Extracting ${name}...`);
        const buf = await entries[i].async('arraybuffer');
        await compressOne(new Uint8Array(buf), name, res, crf);
        setProgress(Math.round((i + 1) / entries.length * 100));
      }
    }

    document.getElementById('log-title').textContent = 'Done';
    log('All files ready.', 'ok');

  } catch (err) {
    log(`Error: ${err.message}`, 'err');
    console.error(err);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Compress';
  }
}
</script>
</body>
</html>
